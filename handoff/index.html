<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jenda — Vibe Coder & AI Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg:     #0d0805;
      --bg2:    #160d07;
      --card:   rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text:   #f5f0ea;
      --muted:  #8a7060;
      --a1:     #f97316;
      --a2:     #fbbf24;
      --glow:   rgba(249,115,22,0.25);
      --r:      14px;
      --r-sm:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
      transition: background 0.45s ease, color 0.45s ease;
    }

    ::selection { background: var(--a1); color: #fff; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    input[type=range] { accent-color: var(--a1); }

    /* Section fade-up reveal */
    .fade-up {
      opacity: 0;
      transform: translateY(36px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .fade-up.in-view { opacity: 1; transform: translateY(0); }

    /* App card stagger */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-animate { animation: cardIn 0.5s ease backwards; }

    /* Hero orb drifts */
    @keyframes float1 {
      0%   { transform: translate(0,   0)   scale(1);    }
      100% { transform: translate(30px,45px) scale(1.12); }
    }
    @keyframes float2 {
      0%   { transform: translate(0,   0)    scale(1);    }
      100% { transform: translate(-40px,-35px) scale(1.15); }
    }

    /* Gradient text animation */
    @keyframes gradShift {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    /* Player slide-up */
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Noise texture overlay on hero */
    .hero-noise::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }

    /* Hide nav links on mobile */
    @media (max-width: 640px) {
      .nav-desktop { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
