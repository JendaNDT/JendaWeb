<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jenda — Embed Player</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0805; --bg2: #160d07;
      --text: #f5f0ea; --muted: #a89684;
      --a1: #f97316; --a2: #fbbf24;
      --border: rgba(255,255,255,0.08);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
    }
    .embed {
      width: 100%; max-width: 480px;
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--border);
    }
    .cover {
      width: 56px; height: 56px; border-radius: 10px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .info { flex: 1; min-width: 0; }
    .title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 15px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .album {
      font-size: 12px; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .branding {
      font-size: 10px; color: var(--muted); opacity: 0.5;
      margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .branding a { color: var(--a1); text-decoration: none; font-weight: 600; }
    .play-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--a1); color: #fff;
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(249,115,22,0.3);
      transition: transform 0.1s;
    }
    .play-btn:hover { transform: scale(1.06); }
    .play-btn svg { fill: currentColor; }
    .progress {
      padding: 0 20px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .bar {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--border); cursor: pointer; position: relative;
      overflow: hidden;
    }
    .bar-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, var(--a1), var(--a2));
      transition: width 0.1s;
    }
    .time { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 32px; }
    .error {
      padding: 40px 20px; text-align: center;
      color: var(--muted); font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="data.js"></script>
  <script>
    const root = document.getElementById('root');
    const params = new URLSearchParams(location.search);
    const trackId = Number(params.get('id'));
    const track = (window.TRACKS_DATA || []).find(t => t.id === trackId);
    const album = track ? (window.ALBUMS || []).find(a => a.id === track.album) : null;

    if (!track) {
      root.innerHTML = '<div class="error">Track not found. Pass ?id=&lt;track-id&gt;</div>';
    } else {
      const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      const col = (c, d) => { c = String(c == null ? '' : c); return /^#?[0-9a-zA-Z(),.%\s]+$/.test(c) ? c : d; };
      const cover = `linear-gradient(135deg, ${col(album?.g1, '#555')}, ${col(album?.g2, '#333')})`;
      root.innerHTML = `
        <div>
          <div class="embed">
            <div class="cover" style="background:${cover}"></div>
            <div class="info">
              <div class="title">${esc(track.title)}</div>
              <div class="album">${esc(album?.title || '')}</div>
              <div class="branding"><a href="https://jenda.cool/#track=${track.id}" target="_blank" rel="noopener">▶ jenda.cool</a></div>
            </div>
            <button class="play-btn" id="play" aria-label="Play">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
          <div class="progress">
            <span class="time" id="cur">0:00</span>
            <div class="bar" id="bar"><div class="bar-fill" id="fill" style="width:0%"></div></div>
            <span class="time" id="dur">${esc(track.duration || '0:00')}</span>
          </div>
        </div>
      `;

      const audio = new Audio();
      if (track.audioUrl) audio.src = track.audioUrl;
      const playBtn = document.getElementById('play');
      const bar = document.getElementById('bar');
      const fill = document.getElementById('fill');
      const cur = document.getElementById('cur');
      const dur = document.getElementById('dur');
      let playing = false;

      const fmt = (s) => {
        if (!isFinite(s) || s < 0) return '0:00';
        const m = Math.floor(s / 60), x = Math.floor(s % 60);
        return `${m}:${x < 10 ? '0' : ''}${x}`;
      };

      playBtn.addEventListener('click', () => {
        if (!track.audioUrl) {
          window.open(`https://jenda.cool/#track=${track.id}`, '_blank');
          return;
        }
        playing = !playing;
        if (playing) audio.play().catch(() => {});
        else audio.pause();
        playBtn.innerHTML = playing
          ? '<svg width="16" height="16" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
          : '<svg width="16" height="16" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
      });

      audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
        cur.textContent = fmt(audio.currentTime);
      });
      audio.addEventListener('loadedmetadata', () => { dur.textContent = fmt(audio.duration); });
      audio.addEventListener('ended', () => {
        playing = false;
        playBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
      });
      bar.addEventListener('click', (e) => {
        if (!audio.duration) return;
        const r = bar.getBoundingClientRect();
        audio.currentTime = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * audio.duration;
      });
    }
  </script>
</body>
</html>
