<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JendaWeb — Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#f97316">
  <meta name="color-scheme" content="dark">

  <!-- Self-hosted fonty (offline-capable) -->
  <link rel="stylesheet" href="vendor/fonts.css">
  <!-- Lokální knihovny (stejné jako web) -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#000000; --bg2:#0b0805; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.10);
      --text:#f5f0ea; --muted:#a89684; --a1:#f97316; --a2:#fbbf24; --err:#f87171; --ok:#4ade80;
      --r-sm:10px; --r-md:14px;
    }
    body {
      background: radial-gradient(1200px 800px at 50% -10%, #1a1008, #000 60%);
      color: var(--text); font-family:'DM Sans', system-ui, sans-serif; line-height:1.6;
      min-height:100vh;
    }
    a { color: var(--a1); }
    button { cursor:pointer; border:none; background:none; font-family:inherit; color:inherit; }
    input {
      width:100%; padding:13px 14px; background:var(--card); border:1px solid var(--border);
      border-radius:var(--r-sm); color:var(--text); font:inherit; font-size:15px; outline:none;
      transition:border-color .2s;
    }
    input:focus { border-color:var(--a1); }
    .syne { font-family:'Syne', system-ui, sans-serif; }

    textarea {
      width:100%; padding:13px 14px; background:var(--card); border:1px solid var(--border);
      border-radius:var(--r-sm); color:var(--text); font:inherit; font-size:15px; outline:none;
      min-height:90px; resize:vertical; transition:border-color .2s;
    }
    textarea:focus { border-color:var(--a1); }
    select {
      width:100%; padding:13px 14px; background:var(--card); border:1px solid var(--border);
      border-radius:var(--r-sm); color:var(--text); font:inherit; font-size:15px; outline:none;
      appearance:none; -webkit-appearance:none;
    }
    select:focus { border-color:var(--a1); }
    label.fld { display:block; font-size:12px; color:var(--muted); font-weight:600; margin-bottom:14px; }
    label.fld > span { display:block; margin-bottom:6px; }

    .btn { padding:11px 16px; border-radius:var(--r-sm); font-weight:700; font-size:14px;
      border:1px solid transparent; transition:opacity .2s, background .2s, border-color .2s; }
    .btn:disabled { opacity:.55; cursor:default; }
    .btn-primary { color:#1a1008; background:linear-gradient(120deg, var(--a1), var(--a2)); }
    .btn-ghost { color:var(--text); border-color:var(--border); background:transparent; }
    .btn-ghost:hover { border-color:var(--a1); }
    .btn-danger { color:var(--err); border-color:color-mix(in srgb, var(--err) 40%, transparent); background:transparent; }
    .btn-danger:hover { background:color-mix(in srgb, var(--err) 12%, transparent); }
    .btn-sm { padding:7px 12px; font-size:13px; font-weight:600; }

    .tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:22px; }
    .tab { padding:9px 15px; border-radius:var(--r-pill, 999px); font-size:14px; font-weight:600;
      color:var(--muted); border:1px solid var(--border); background:transparent; }
    .tab.active { color:#1a1008; background:linear-gradient(120deg, var(--a1), var(--a2)); border-color:transparent; }

    .list { display:grid; grid-template-columns:repeat(auto-fill, minmax(460px, 1fr)); gap:10px; }
    @media (max-width:620px){ .list { grid-template-columns:1fr; } }
    .item { display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:var(--r-md);
      background:var(--card); border:1px solid var(--border); margin-bottom:0; }
    .item .grow { flex:1; min-width:0; }
    .item .t { font-weight:700; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .item .s { font-size:12.5px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .swatch { width:30px; height:30px; border-radius:8px; flex:0 0 auto; border:1px solid var(--border); }

    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px);
      display:flex; align-items:flex-start; justify-content:center; padding:24px 14px; z-index:100; overflow-y:auto; }
    .modal { width:100%; max-width:480px; background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--r-md); padding:22px; margin:auto; box-shadow:0 30px 80px rgba(0,0,0,.6); }

    .drop { border:1.5px dashed var(--border); border-radius:var(--r-sm); padding:18px; text-align:center;
      font-size:13.5px; color:var(--muted); cursor:pointer; transition:border-color .2s, background .2s; }
    .drop.over { border-color:var(--a1); background:color-mix(in srgb, var(--a1) 8%, transparent); }
    .prog { height:8px; border-radius:99px; background:var(--card); overflow:hidden; margin-top:8px; }
    .prog > i { display:block; height:100%; background:linear-gradient(90deg, var(--a1), var(--a2)); transition:width .15s; }

    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { width:16px; height:16px; border:2px solid rgba(255,255,255,.25); border-top-color:#1a1008;
      border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:-2px; }

    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:200;
      padding:11px 18px; border-radius:99px; font-size:14px; font-weight:600; box-shadow:0 10px 40px rgba(0,0,0,.45); }
    .toast.ok { background:color-mix(in srgb, var(--ok) 18%, var(--bg2)); border:1px solid color-mix(in srgb, var(--ok) 45%, transparent); color:var(--text); }
    .toast.err { background:color-mix(in srgb, var(--err) 18%, var(--bg2)); border:1px solid color-mix(in srgb, var(--err) 45%, transparent); color:var(--text); }

    .iconbtn { width:34px; height:34px; border-radius:9px; border:1px solid var(--border); background:var(--card);
      color:var(--text); font-size:14px; display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto;
      text-decoration:none; transition:border-color .2s, background .2s; }
    .iconbtn:hover { border-color:var(--a1); background:color-mix(in srgb, var(--a1) 10%, transparent); }
    .iconbtn.playing { border-color:var(--a1); color:var(--a1); }
    .grip { cursor:grab; color:var(--muted); font-size:17px; padding:0 2px; flex:0 0 auto; user-select:none; line-height:1; }
    .grip:active { cursor:grabbing; }
    .item.dragover { border-color:var(--a1); box-shadow:0 0 0 2px color-mix(in srgb, var(--a1) 45%, transparent); }
    .item.dragging { opacity:.4; }
    .badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; text-transform:uppercase;
      letter-spacing:.05em; flex:0 0 auto; white-space:nowrap; }
    .badge.warn { color:var(--a2); background:color-mix(in srgb, var(--a2) 15%, transparent); border:1px solid color-mix(in srgb, var(--a2) 40%, transparent); }
    .thumb { width:60px; height:60px; border-radius:10px; object-fit:cover; border:1px solid var(--border); background:var(--card); display:block; }
    .toolbar { display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
    .toggle { padding:8px 13px; border-radius:99px; border:1px solid var(--border); background:transparent;
      color:var(--muted); font-size:13px; font-weight:600; }
    .toggle.on { color:#1a1008; background:linear-gradient(120deg,var(--a1),var(--a2)); border-color:transparent; }
    .search { flex:1 1 180px; max-width:300px; padding:9px 13px !important; font-size:14px !important; }
    .tabcount { opacity:.6; font-weight:600; }
    .filelist { font-size:13px; color:var(--muted); margin-top:10px; max-height:120px; overflow:auto;
      border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 10px; }
    input[type=checkbox] { width:auto !important; padding:0 !important; height:auto !important; margin-right:6px;
      accent-color:var(--a1); vertical-align:-1px; }

    .statgrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(165px, 1fr)); gap:12px; margin-bottom:20px; }
    .stat { background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:16px; }
    .stat .num { font-family:'Syne', sans-serif; font-weight:800; font-size:26px; line-height:1.05; }
    .stat .lbl { font-size:12.5px; color:var(--muted); margin-top:6px; }
    .stat .sub2 { font-size:11.5px; color:var(--muted); opacity:.85; margin-top:3px; }
    .bar { height:8px; border-radius:99px; background:rgba(255,255,255,0.07); overflow:hidden; margin-top:10px; }
    .bar > i { display:block; height:100%; background:linear-gradient(90deg, var(--a1), var(--a2)); }
    .sectionlabel { font-size:12px; font-weight:700; color:var(--a2); text-transform:uppercase; letter-spacing:.06em; margin:4px 0 10px; }
    .todo { display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:var(--r-sm); margin-bottom:8px; font-size:14px;
      background:color-mix(in srgb, var(--a2) 9%, transparent); border:1px solid color-mix(in srgb, var(--a2) 30%, transparent); cursor:pointer; }
    .todo:hover { border-color:var(--a2); }
    .todo.done { background:color-mix(in srgb, var(--ok) 9%, transparent); border-color:color-mix(in srgb, var(--ok) 30%, transparent); cursor:default; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- data.js jen kvůli výchozím textům webu (window.STRINGS); admin obsah jinak čte ze Supabase -->
  <script src="data.js"></script>
  <script type="text/babel" src="admin.jsx?v=17"></script>
</body>
</html>
